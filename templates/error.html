<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HawkEye | Error {{ code }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}">
</head>
<body>
<div class="container">
    <div class="hero">
        <div class="logo-area">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="HawkEye Logo" class="logo">
        </div>
        <h1>{{ code }}</h1>
        <p class="subtitle">{{ 'Page Not Found' if code == 404 else 'Something Went Wrong' }}</p>
        <p class="description">{{ message }}</p>
    </div>
    <div style="text-align:center;">
        <a href="/" class="download-btn">🏠 Return to HawkEye Home</a>
    </div>
    <div class="footer">
        © 2026 HawkEye | Developed by Devansh
    </div>
</div>
</body>
</html>
